function initTabNavigation() {
    const navLinks = document.querySelectorAll('.nav-links a[href^="#"]');
    const sections = document.querySelectorAll('section[id$="-section"]');

    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const targetId = link.getAttribute('href').substring(1);
            
            navLinks.forEach(n => n.classList.remove('active'));
            link.classList.add('active');
            
            sections.forEach(s => {
                if(s.id === targetId || (targetId === 'search-section' && s.classList.contains('hero-section'))) {
                    s.classList.add('active');
                    s.style.display = 'block';
                } else if(s.id === targetId) {
                     s.style.display = 'block';
                } else {
                    s.classList.remove('active');
                    s.style.display = 'none';
                }
            });
            // Also hero section handling
            const hero = document.querySelector('.hero-section');
            if(hero) {
                if(targetId === 'search-section') {
                    hero.style.display = 'block';
                } else {
                    hero.style.display = 'none';
                }
            }
            
            window.scrollTo({top:0, behavior:'smooth'});
        });
    });
    
    // Default Tab
    const hash = window.location.hash || '#search-section';
    const defaultLink = document.querySelector(`.nav-links a[href="${hash}"]`);
    if(defaultLink) {
        defaultLink.click();
    } else {
        // Fallback
        if(navLinks.length > 0) navLinks[0].click();
    }
}

function fetchRealCover(bookTitle, domElement) {
    const searchUrl = `https://www.yes24.com/Product/Search?domain=ALL&query=${encodeURIComponent(bookTitle)}`;
    fetch(searchUrl)
        .then(res => res.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const img = doc.querySelector('.img_bdr img');
            if(img && img.dataset.original) {
                domElement.innerHTML = `<img src="${img.dataset.original}" style="width:100%; height:100%; object-fit:cover; border-radius:4px;" alt="${bookTitle} ?쒖?">`;
            } else if (img && img.src) {
                domElement.innerHTML = `<img src="${img.src}" style="width:100%; height:100%; object-fit:cover; border-radius:4px;" alt="${bookTitle} ?쒖?">`;
            }
        })
        .catch(err => console.error("Cover fetch failed:", err));
}

function setupArchiveSearch() {
    const archiveSearchInput = document.getElementById("archive-search-input");
    const clearArchiveBtn = document.getElementById("clear-archive-search");
    const archiveFilters = document.querySelectorAll(".archive-filter-btn");

    if(!archiveSearchInput) return;

    let currentFilter = "all";

    function doSearch() {
        executeArchiveSearch(archiveSearchInput.value, currentFilter);
    }

    archiveSearchInput.addEventListener("input", doSearch);
    
    if(clearArchiveBtn) {
        clearArchiveBtn.addEventListener("click", () => {
            archiveSearchInput.value = "";
            doSearch();
        });
    }

    archiveFilters.forEach(btn => {
        btn.addEventListener("click", () => {
            archiveFilters.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            doSearch();
        });
    });
}

function executeArchiveSearch(query, filter) {
    const q = query.toLowerCase();
    
    const cards = document.querySelectorAll('#archive-grid .archive-card');
    cards.forEach(card => {
        const title = card.querySelector('h4').innerText.toLowerCase();
        const desc = card.querySelector('p').innerText.toLowerCase();
        const matchesQuery = title.includes(q) || desc.includes(q);
        
        let matchesFilter = false;
        if(filter === 'all') {
            matchesFilter = true;
        } else if(filter === 'pdf' && card.innerHTML.includes('fa-file-pdf')) {
            matchesFilter = true;
        } else if(filter === 'pptx' && card.innerHTML.includes('fa-file-powerpoint')) {
            matchesFilter = true;
        } else if(filter === 'doc' && card.innerHTML.includes('fa-file-word')) {

}
